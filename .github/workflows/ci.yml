name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build-test-analyze:
    runs-on: ubuntu-latest
    
    # On définit les services ici pour qu'ils soient dispos pendant l'analyse
    services:
      db:
        image: postgis/postgis:latest
        env:
          POSTGRES_DB: sdmis_db
          POSTGRES_USER: sdmis
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      rabbitmq:
        image: rabbitmq:3-management
        ports:
          - 5672:5672

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Important pour SonarQube (historique Git)

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Install Tools
      run: |
        dotnet tool install --global dotnet-sonarscanner
        dotnet tool install --global dotnet-coverage
        dotnet tool install --global dotnet-ef

    - name: Restore dependencies
      run: |
        dotnet restore SDMISAppQG/SDMISAppQG.csproj
        dotnet restore SDMISTests/SDMISTests.csproj
    
    - name: Check code formatting
      run: dotnet format SDMISAppQG/SDMISAppQG.csproj

    - name: Run migrations
      run: dotnet ef database update --project SDMISAppQG/SDMISAppQG.csproj --startup-project SDMISAppQG/SDMISAppQG.csproj
      env:
        ConnectionStrings__DefaultConnection: Host=localhost;Port=5432;Database=sdmis_db;Username=sdmis;Password=password

    - name: Build and Analyze
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: |
        # 1. Début de l'analyse Sonar
        dotnet-sonarscanner begin /k:"SDMISAppQG-Backend" \
          /d:sonar.host.url="${{ secrets.SONAR_HOST_URL }}" \
          /d:sonar.token="${{ secrets.SONAR_TOKEN }}" \
          /d:sonar.cs.vscoveragexml.reportsPaths=coverage.xml \
          /d:sonar.scanner.skipDotnetInstall=true

        # 2. Build de l'application
        dotnet build SDMISAppQG/SDMISAppQG.csproj --configuration Release --no-restore

        # 3. Exécution des tests avec collecte de couverture
        dotnet-coverage collect "dotnet test SDMISTests/SDMISTests.csproj --configuration Release --no-build" -f xml -o "coverage.xml"

        # 4. Fin de l'analyse et envoi des résultats
        dotnet-sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

  docker-build:
    runs-on: ubuntu-latest
    needs: build-test-analyze
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build Docker image
      run: docker build -f SDMISAppQG/Dockerfile -t sdmisappqg-backend:latest .
    
    - name: Test Docker image
      run: |
        docker images sdmisappqg-backend:latest
        echo "Image Docker construite avec succès"