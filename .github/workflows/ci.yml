
name: CI

on:
  push:
    branches: [ master ]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    
    - name: Restore dependencies
      run: dotnet restore SDMISAppQG/SDMISAppQG.csproj
    
    - name: Check code formatting
      run: dotnet format SDMISAppQG/SDMISAppQG.csproj --verify-no-changes --verbosity diagnostic
    
    - name: Build project
      run: dotnet build SDMISAppQG/SDMISAppQG.csproj --configuration Release --no-restore

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-build
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build Docker image
      run: docker build -f SDMISAppQG/Dockerfile -t sdmisappqg-backend:latest .
    
    - name: Test Docker image
      run: |
        docker images sdmisappqg-backend:latest
        echo "Image Docker construite avec succès"
