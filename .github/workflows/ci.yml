name: CI

on:
  push:
    branches: [ master ]

jobs:
  build-test-analyze:
    runs-on: ubuntu-latest
    
    # Tes services indispensables pour les migrations et les tests
    services:
      db:
        image: postgis/postgis:latest
        env:
          POSTGRES_DB: sdmis_db
          POSTGRES_USER: sdmis
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      rabbitmq:
        image: rabbitmq:3-management
        ports:
          - 5672:5672

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Install Tools
      run: |
        dotnet tool install --global dotnet-sonarscanner
        dotnet tool install --global dotnet-ef

    - name: Restore dependencies
      run: |
        dotnet restore SDMISAppQG/SDMISAppQG.csproj
        dotnet restore SDMISTests/SDMISTests.csproj
    
    - name: Check code formatting
      # Ton étape originale de formatage
      run: dotnet format SDMISAppQG/SDMISAppQG.csproj    

    - name: Run migrations
      # Ton étape de migration (nécessite la DB lancée en service plus haut)
      run: dotnet ef database update --project SDMISAppQG/SDMISAppQG.csproj --startup-project SDMISAppQG/SDMISAppQG.csproj
      env:
        ConnectionStrings__DefaultConnection: Host=localhost;Port=5432;Database=sdmis_db;Username=sdmis;Password=password
    
    - name: Build and Analyze
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        # On ajoute la connexion DB ici aussi pour les tests d'intégration
        ConnectionStrings__DefaultConnection: Host=localhost;Port=5432;Database=sdmis_db;Username=sdmis;Password=password
      run: |
        # 1. Initialisation Sonar (avec chemin vers le rapport OpenCover)
        dotnet-sonarscanner begin /k:"SDMISAppQG-Backend" \
          /d:sonar.host.url="${{ secrets.SONAR_HOST_URL }}" \
          /d:sonar.token="${{ secrets.SONAR_TOKEN }}" \
          /d:sonar.cs.cobertura.reportsPaths="**/TestResults/**/coverage.cobertura.xml" \
          /d:sonar.scanner.skipDotnetInstall=true
        
        # 2. Build
        dotnet build SDMISAppQG/SDMISAppQG.csproj --configuration Release --no-restore
        
        # 3. Tests
        dotnet test SDMISTests/SDMISTests.csproj --configuration Release --collect:"XPlat Code Coverage"
        
        # 4. Finalisation Sonar
        dotnet-sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

  docker-build:
    runs-on: ubuntu-latest
    needs: build-test-analyze
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build Docker image
      run: docker build -f SDMISAppQG/Dockerfile -t sdmisappqg-backend:latest .
    
    - name: Test Docker image
      run: |
        docker images sdmisappqg-backend:latest
        echo "Image Docker construite avec succès"